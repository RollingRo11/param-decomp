pd:
  seed: 0
  n_mask_samples: 1
  ci_config:
    mode: layerwise
    fn_type: shared_mlp
    hidden_dims:
    - 256
  sigmoid_type: leaky_hard
  decomposition_targets:
  - module_pattern: layers.*.mlp_in
    C: 400
  - module_pattern: layers.*.mlp_out
    C: 400
  use_delta_component: true
  batch_size: 2048
  steps: 25000
  components_optimizer:
    lr_schedule:
      start_val: 3e-4
      fn_type: constant
      warmup_pct: 0.0
  ci_fn_optimizer:
    lr_schedule:
      start_val: 3e-4
      fn_type: constant
      warmup_pct: 0.0
  faithfulness_warmup_steps: 200
  faithfulness_warmup_lr: 0.01
  faithfulness_warmup_weight_decay: 0.0
  loss_metrics:
    - type: ImportanceMinimalityLoss
      coeff: 0.0001
      pnorm: 2.0
      beta: 0
    - type: StochasticReconSubsetLoss
      coeff: 2.0
    - type: PGDReconSubsetLoss
      coeff: 2.0
      init: random
      step_size: 1.0
      n_steps: 1
      mask_scope: shared_across_batch
    - type: FaithfulnessLoss
      coeff: 0.0
cadence:
  train_log_every: 50
eval:
  n_steps: 100
  batch_size: 2048
  every: 500
  slow_every: 5000
  slow_on_first_step: true
  metrics:
    - type: CIHistograms
      n_batches_accum: 5
    - type: ComponentActivationDensity
      ci_alive_threshold: 0.1
    - type: PermutedCIPlots
      identity_patterns:
      - layers.*.mlp_in
      dense_patterns:
      - layers.*.mlp_out
    - type: IdentityCIError
      identity_ci:
      - layer_pattern: layers.*.mlp_in
        n_features: 100
      dense_ci:
      - layer_pattern: layers.*.mlp_out
        k: 25
    - type: CI_L0
      groups: null
      ci_alive_threshold: 0.1
    - type: CIMeanPerComponent
    - type: StochasticHiddenActsReconLoss
    - type: PGDReconLoss
      init: random
      step_size: 0.1
      n_steps: 20
      mask_scope: shared_across_batch
target:
  run_path: goodfire/spd-pre-Sep-2025/runs/any9ekl9
data:
  feature_probability: 0.01
  data_generation_type: at_least_zero_active
runtime:
  autocast_bf16: true
  device: cuda
  dp: null
wandb:
  project: param-decomp
