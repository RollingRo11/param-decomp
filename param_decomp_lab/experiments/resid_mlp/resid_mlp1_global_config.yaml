pd:
  seed: 0
  n_mask_samples: 1
  ci_config:
    mode: global
    fn_type: global_shared_mlp
    hidden_dims:
    - 400
    - 300
  sigmoid_type: leaky_hard
  decomposition_targets:
  - module_pattern: layers.*.mlp_in
    C: 100
  - module_pattern: layers.*.mlp_out
    C: 100
  identity_decomposition_targets: null
  use_delta_component: true
  batch_size: 2048
  steps: 20000
  components_optimizer:
    lr_schedule:
      start_val: 2e-3
      fn_type: constant
      warmup_pct: 0.0
  ci_fn_optimizer:
    lr_schedule:
      start_val: 2e-3
      fn_type: constant
      warmup_pct: 0.0
  faithfulness_warmup_steps: 200
  faithfulness_warmup_lr: 0.01
  faithfulness_warmup_weight_decay: 0.1
  loss_metrics:
    - type: ImportanceMinimalityLoss
      coeff: 1e-5
      pnorm: 2.0
      beta: 0
    - type: StochasticReconLayerwiseLoss
      coeff: 1.0
    - type: StochasticReconLoss
      coeff: 1.0
cadence:
  train_log_every: 100
eval:
  n_steps: 100
  batch_size: 2048
  every: 500
  slow_every: 5000
  slow_on_first_step: true
  metrics:
    - type: CIHistograms
      n_batches_accum: 5
    - type: ComponentActivationDensity
      ci_alive_threshold: 0.1
    - type: PermutedCIPlots
      identity_patterns:
      - layers.*.mlp_in
      dense_patterns:
      - layers.*.mlp_out
    - type: IdentityCIError
      identity_ci:
      - layer_pattern: layers.*.mlp_in
        n_features: 100
      dense_ci:
      - layer_pattern: layers.*.mlp_out
        k: 50
    - type: CI_L0
      groups: null
      ci_alive_threshold: 0.1
    - type: CIMeanPerComponent
    - type: StochasticHiddenActsReconLoss
target:
  run_path: goodfire/spd-pre-Sep-2025/runs/pziyck78
data:
  feature_probability: 0.01
  data_generation_type: at_least_zero_active
runtime:
  autocast_bf16: true
  device: cuda
  dp: null
wandb:
  project: param-decomp
