pd:
  seed: 0
  n_mask_samples: 1
  ci_config:
    mode: layerwise
    fn_type: mlp
    hidden_dims:
    - 16
  sigmoid_type: leaky_hard
  decomposition_targets:
  - module_pattern: linear1
    C: 20
  - module_pattern: linear2
    C: 20
  use_delta_component: true
  loss_metrics:
    - type: ImportanceMinimalityLoss
      coeff: 3e-3
      pnorm: 1.0
      beta: 0
    - type: StochasticReconLoss
      coeff: 1.0
    - type: StochasticReconLayerwiseLoss
      coeff: 1.0
  batch_size: 4096
  steps: 10000
  components_optimizer:
    lr_schedule:
      start_val: 1e-3
      fn_type: cosine
      warmup_pct: 0.0
      final_val_frac: 0.0
  ci_fn_optimizer:
    lr_schedule:
      start_val: 1e-3
      fn_type: cosine
      warmup_pct: 0.0
      final_val_frac: 0.0
  faithfulness_warmup_steps: 200
  faithfulness_warmup_lr: 0.01
  faithfulness_warmup_weight_decay: 0.1
cadence:
  train_log_every: 100
eval:
  n_steps: 100
  batch_size: 4096
  every: 1000
  slow_every: 5000
  metrics:
    - type: CIHistograms
      n_batches_accum: 5
    - type: ComponentActivationDensity
      ci_alive_threshold: 0.1
    - type: PermutedCIPlots
      identity_patterns:
      - linear1
      - linear2
      dense_patterns: null
    - type: IdentityCIError
      identity_ci:
      - layer_pattern: linear1
        n_features: 5
      - layer_pattern: linear2
        n_features: 5
      dense_ci: null
    - type: CI_L0
      groups: null
      ci_alive_threshold: 0.1
    - type: CIMeanPerComponent
    - type: StochasticHiddenActsReconLoss
target:
  run_path: goodfire/spd-pre-Sep-2025/runs/0hsp07o4
data:
  feature_probability: 0.05
  data_generation_type: at_least_zero_active
runtime:
  autocast_bf16: true
  device: cuda
  dp: null
wandb:
  project: param-decomp
