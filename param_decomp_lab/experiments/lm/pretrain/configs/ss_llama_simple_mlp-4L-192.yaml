wandb_project: param-decomp
dtype: bfloat16
batch_size: 1024
num_iterations: 100_000
warmup_iters: 600
learning_rate: 3e-4
learning_rate_decay_frac: 0.1
weight_decay: 0.1
grad_clip: 1.0
val_loss_every: 1000
val_max_steps: 20
sample_every: 1000
intermediate_checkpoints: false

model:
  model_type: LlamaSimpleMLP
  block_size: 512
  vocab_size: 4019
  n_layer: 4
  n_head: 6
  n_embd: 192
  n_intermediate: 768  # 192 * 4
  rotary_dim: 32       # 192 // 6
  n_ctx: 512
  n_key_value_heads: 3
  flash_attention: false

data:
  dataset_name: SimpleStories/SimpleStories
  tokenizer_name: SimpleStories/test-SimpleStories-gpt2-1.25M
  is_tokenized: false
  streaming: false
  max_seq_len: 513  # model.block_size + 1 for next-token label indexing
  train_split: train
  eval_split: test
  column_name: story
