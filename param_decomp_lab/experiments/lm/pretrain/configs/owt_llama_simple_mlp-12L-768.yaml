wandb_project: param-decomp
dtype: bfloat16
batch_size: 1024
num_iterations: 100_000
warmup_iters: 600
learning_rate: 3e-4
learning_rate_decay_frac: 0.1
weight_decay: 0.1
grad_clip: 1.0
val_loss_every: 1000
val_max_steps: 20
sample_every: 1000
intermediate_checkpoints: false

model:
  model_type: LlamaSimpleMLP
  block_size: 512
  vocab_size: 50257  # GPT-2 tokenizer native vocab size
  n_layer: 12
  n_head: 12
  n_embd: 768
  n_intermediate: 3072  # 768 * 4
  rotary_dim: 128       # 768 // 6
  n_ctx: 512
  n_key_value_heads: 12
  flash_attention: false

data:
  dataset_name: Skylion007/openwebtext
  tokenizer_name: gpt2
  is_tokenized: false
  streaming: false
  max_seq_len: 513  # model.block_size + 1 for next-token label indexing
  train_split: train[:10000000]
  eval_split: train[-100000:]
  column_name: text
