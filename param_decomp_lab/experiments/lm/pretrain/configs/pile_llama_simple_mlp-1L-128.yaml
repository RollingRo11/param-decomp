wandb_project: param-decomp
dtype: bfloat16
batch_size: 1024
num_iterations: 100_000
warmup_iters: 600
learning_rate: 3e-4
learning_rate_decay_frac: 0.1
weight_decay: 0.1
grad_clip: 1.0
val_loss_every: 1000
val_max_steps: 20
sample_every: 1000
intermediate_checkpoints: false

model:
  model_type: LlamaSimpleMLP
  block_size: 512
  vocab_size: 4019
  n_layer: 2
  n_head: 4
  n_embd: 128
  n_intermediate: 512  # 128 * 4
  rotary_dim: 32       # 128 // 4
  n_ctx: 512
  n_key_value_heads: 2
  flash_attention: false

data:
  dataset_name: danbraunai/pile-uncopyrighted-tok
  tokenizer_name: EleutherAI/gpt-neox-20b
  is_tokenized: true
  streaming: false
  max_seq_len: 513  # model.block_size + 1 for next-token label indexing
  train_split: train
  eval_split: val
  column_name: input_ids
