pd:
  seed: 0
  n_mask_samples: 1
  ci_config:
    mode: global
    fn_type: global_shared_transformer
    hidden_dims: null
    simple_transformer_ci_cfg:
      d_model: 512
      n_blocks: 5
      mlp_hidden_dim:
      - 2048
      attn_config:
        n_heads: 8
        max_len: 512
        rope_base: 10000.0
  sampling: continuous
  sigmoid_type: leaky_hard
  decomposition_targets:
  - module_pattern: h.*.mlp.c_fc
    C: 3072
  - module_pattern: h.*.mlp.down_proj
    C: 3584
  - module_pattern: h.*.attn.q_proj
    C: 512
  - module_pattern: h.*.attn.k_proj
    C: 512
  - module_pattern: h.*.attn.v_proj
    C: 1024
  - module_pattern: h.*.attn.o_proj
    C: 1024
  identity_decomposition_targets: null
  use_delta_component: true
  components_optimizer:
    lr_schedule:
      start_val: 5.0e-05
      warmup_pct: 0.0
      final_val_frac: 0.1
      fn_type: cosine
    grad_clip_norm: 0.01
  ci_fn_optimizer:
    lr_schedule:
      start_val: 5.0e-05
      warmup_pct: 0.0
      final_val_frac: 0.1
      fn_type: cosine
  steps: 100000
  batch_size: 64
  faithfulness_warmup_steps: 400
  faithfulness_warmup_lr: 0.001
  faithfulness_warmup_weight_decay: 0.0
  loss_metrics:
  - type: ImportanceMinimalityLoss
    coeff: 0.0001
    pnorm: 2.0
    beta: 0.5
    p_anneal_start_frac: 0.0
    p_anneal_final_p: 0.4
    p_anneal_end_frac: 1.0
    eps: 1.0e-12
  - type: StochasticReconSubsetLoss
    coeff: 0.5
    routing:
      type: uniform_k_subset
  - type: FaithfulnessLoss
    coeff: 10000000.0
cadence:
  train_log_every: 200
eval:
  n_steps: 1
  batch_size: 128
  every: 1000
  slow_every: 10000
  slow_on_first_step: true
  metrics:
  - type: CIHistograms
    n_batches_accum: 1
  - type: ComponentActivationDensity
  - type: CI_L0
    groups: null
  - type: CEandKLLosses
    rounding_threshold: 0.0
  - type: CIMeanPerComponent
  - type: StochasticHiddenActsReconLoss
  - type: CIHiddenActsReconLoss
  - type: PGDReconLoss
    init: random
    step_size: 0.1
    n_steps: 20
    mask_scope: shared_across_batch
target:
  spec:
    kind: pretrained
    model_class: param_decomp_lab.experiments.lm.pretrain.models.llama_simple_mlp.LlamaSimpleMLP
    run_path: goodfire/spd/runs/t-9d2b8f02
  output_extract: 0
data:
  tokenizer_name: EleutherAI/gpt-neox-20b
  max_seq_len: 512
  buffer_size: 1000
  dataset_name: danbraunai/pile-uncopyrighted-tok-shuffled
  column_name: input_ids
  train_split: train
  eval_split: val
  shuffle_each_epoch: true
  is_tokenized: true
  streaming: true
runtime:
  autocast_bf16: true
  device: cuda
  dp: null
wandb:
  project: param-decomp
